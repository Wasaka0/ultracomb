name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version-number: ${{ steps.fetch-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch project version
        id: fetch-version
        run: |
          version="$(grep "version =" Cargo.toml | sed 's/^version = //' | tr -d '"')"
          echo "VERSION=$version" >> $GITHUB_OUTPUT

  compile:
    needs: [get-version]
    strategy:
      matrix:
        include:
          - { name: windows,         os: windows-latest }
          - { name: ubuntu,    os: ubuntu-latest }
          - { name: macos, os: macos-latest }
    runs-on:  ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Install ubuntu dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y libgl-dev libx11-xcb-dev
      if: contains(matrix.os, 'ubuntu')
    - name: Compile for ${{ matrix.name }}
      run: cargo xtask bundle ultracomb --release
    - run: mkdir -p plug-in
    - run: cp -r ./target/bundled/ plug-in
    - name: Move vst3 file 
      run: |
          cp ./plug-in/bundled/Ultracomb.vst3/Contents/x86_64-win/*.vst3 .
          rm -r ./plug-in/bundled/
      if: contains(matrix.os, 'windows')
    - uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.name }}-${{ needs.get-version.outputs.version-number }}
        path: plug-in
        if-no-files-found: error
