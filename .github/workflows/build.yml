name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo xtask bundle ultracomb --release
    - uses: actions/upload-artifact@v6
      with:
        name: windows
        path: |
          target/bundled/**/*.clap
          target/bundled/**/*.vst3
        if-no-files-found: error
