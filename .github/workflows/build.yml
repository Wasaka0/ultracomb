name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo xtask bundle ultracomb --release
    - run: mkdir -p plug-in
    - run: copy .\target\bundled\*.clap plug-in
    - run: copy .\target\bundled\*.vst3\Contents\x86_64-win\*.vst3 plug-in
    - uses: actions/upload-artifact@v6
      with:
        name: windows
        path: plug-in
        if-no-files-found: error
